# Design Ref: §3.1 — Production profile for Railway deployment
spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8081}

# Logging — production level
logging:
  level:
    com.mylog: INFO
    org.hibernate.SQL: WARN
