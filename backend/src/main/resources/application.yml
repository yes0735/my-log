spring:
  application:
    name: mylog-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mylog
    username: mylog
    password: mylog1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: email, profile
            redirect-uri: "{baseUrl}/api/v1/auth/oauth/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/api/v1/auth/oauth/callback/{registrationId}"
          kakao:
            client-id: ${KAKAO_CLIENT_ID:placeholder}
            client-secret: ${KAKAO_CLIENT_SECRET:placeholder}
            scope: account_email, profile_nickname, profile_image
            redirect-uri: "{baseUrl}/api/v1/auth/oauth/callback/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# OAuth2
oauth:
  redirect-base: ${OAUTH_REDIRECT_BASE:http://localhost:5173}

server:
  port: 8081

# JWT — Design Ref: §7 — JWT secrets externalized to environment variables
jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 1800000   # 30 minutes
  refresh-token-expiration: 604800000 # 7 days

# AES Encryption — Design Ref: §5 — AES-256-GCM for personal data
security:
  aes:
    secret-key: ${AES_SECRET_KEY:ZGV2LWFlcy1zZWNyZXQta2V5LTMyYnl0ZXMhIQ==}

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Aladin TTB Open API (replaces Naver)
# Key 발급: https://blog.aladin.co.kr/openapi/manage
# 키 없을 경우 Mock 데이터로 폴백 (개발 편의)
aladin:
  ttb-key: ${ALADIN_TTB_KEY:}

# Logging
logging:
  level:
    com.mylog: DEBUG
    org.hibernate.SQL: DEBUG
