version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mylog-postgres
    environment:
      POSTGRES_DB: mylog
      POSTGRES_USER: mylog
      POSTGRES_PASSWORD: mylog1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
